<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD-Style 3D Manual</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #2c2c2c; color: white; overflow: hidden; }
        .sidebar { width: 350px; padding: 30px; background: #1a1a1a; display: flex; flex-direction: column; border-right: 1px solid #444; }
        .step-info { flex-grow: 1; }
        h1 { font-size: 20px; color: #3b82f6; }
        p { color: #ccc; line-height: 1.5; }
        .nav-controls { display: flex; gap: 10px; padding-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        
        .viewer-container { flex-grow: 1; position: relative; cursor: crosshair; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
        
        .hint { position: absolute; top: 20px; right: 20px; font-size: 11px; color: #888; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="step-info">
            <span id="step-label" style="font-size: 12px; color: #888;">STEP 01</span>
            <h1 id="step-title">Y-Axis Assembly</h1>
            <p id="step-desc">Loading assembly instructions...</p>
        </div>
        <div class="nav-controls">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>PREV</button>
            <button id="nextBtn" onclick="changeStep(1)">NEXT</button>
        </div>
    </div>

    <div class="viewer-container">
        <model-viewer 
            id="manual-viewer"
            src="100_01__Beam_MGN_Y_Axis__asmbl___V1.glb" 
            camera-controls 
            touch-action="none"
            interaction-prompt="none"
            camera-orbit="45deg 75deg auto"
            field-of-view="30deg"
            interpolation-decay="100"
            min-camera-orbit="auto auto auto"
            max-camera-orbit="auto auto auto"
            shadow-intensity="1"
            environment-image="neutral">
        </model-viewer>
        
        <div class="hint">CAD MODE: Left Click to Tumble | Right Click to Pan | Scroll to Zoom</div>
    </div>

    <script>
        const viewer = document.getElementById('manual-viewer');

        // This script forces the model to treat ALL axes as equal (Trackball style)
        // by resetting the 'up' vector constraints as much as the browser allows.
        viewer.addEventListener('load', () => {
            const orbit = viewer.getCameraOrbit();
            viewer.cameraOrbit = `${orbit.theta}rad ${orbit.phi}rad auto`;
        });

        const steps = [
            {
                label: "STEP 01",
                title: "Y-Axis Beam Assembly",
                desc: "Align the MGN linear rail with the pre-drilled holes on the aluminum extrusion.",
                file: "100_01__Beam_MGN_Y_Axis__asmbl___V1.glb"
            },
            {
                label: "STEP 02",
                title: "Motor Installation",
                desc: "Mount the stepper motor using the provided M3 screws.",
                file: "step2_motor.glb" 
            }
        ];

        let currentStep = 0;
        document.getElementById('step-desc').innerText = steps[0].desc;

        function changeStep(direction) {
            currentStep += direction;
            document.getElementById('step-label').innerText = steps[currentStep].label;
            document.getElementById('step-title').innerText = steps[currentStep].title;
            document.getElementById('step-desc').innerText = steps[currentStep].desc;
            viewer.src = steps[currentStep].file;

            document.getElementById('prevBtn').disabled = (currentStep === 0);
            document.getElementById('nextBtn').disabled = (currentStep === steps.length - 1);
        }
    </script>
</body>
</html>
