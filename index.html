<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xplorer IDEX Twin AFC - Color Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --accent: #2563eb; --bg: #ffffff; --sidebar: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body.dark-mode { --bg: #121212; --sidebar: #1a1a1a; --text: #e2e8f0; --border: #333; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        .sidebar { width: 340px; padding: 25px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .progress-container { width: 100%; height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        h1 { font-size: 22px; margin: 5px 0; color: var(--accent); }
        #viewport { flex-grow: 1; position: relative; background: #ffffff; }
        #canvas-container { width: 100%; height: 100%; position: absolute; }
        #loader-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <select id="chapterSelect" onchange="loadChapter(this.value)"></select>
        <div class="step-content">
            <h1 id="step-title">Xplorer IDEX</h1>
            <div id="step-desc">Loading...</div>
        </div>
        <div class="nav-btns">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Back</button>
            <button id="nextBtn" onclick="changeStep(1)" disabled>Next</button>
        </div>
    </div>

    <div id="viewport">
        <div id="loader-ui">Loading Color Model...</div>
        <div id="canvas-container"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { ArcballControls } from 'three/addons/controls/ArcballControls.js';

        let menuData = [], currentChapIdx = 0, currentStepIdx = 0;
        let scene, camera, renderer, controls, currentModel;
        const fbxLoader = new FBXLoader();

        fetch('menu.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                menuData = data;
                populateChapters();
                initThree();
                loadStep(0, 0);
            });

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 340) / window.innerHeight, 1, 10000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Bright lighting to show off the colors
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(10, 20, 10);
            scene.add(light);

            controls = new ArcballControls(camera, renderer.domElement, scene);
            animate();
        }

        async function loadStep(chapIdx, stepIdx) {
            currentChapIdx = chapIdx;
            currentStepIdx = stepIdx;
            const step = menuData[chapIdx].steps[stepIdx];
            const version = '?v=' + new Date().getTime();

            document.getElementById('step-title').innerText = step.title;
            const loaderUI = document.getElementById('loader-ui');
            loaderUI.style.display = "block";

            if (currentModel) scene.remove(currentModel);

            fbxLoader.load(step.file + version, (fbx) => {
                currentModel = fbx;
                
                // This preserves the colors from your Fusion export
                currentModel.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                const box = new THREE.Box3().setFromObject(currentModel);
                currentModel.position.sub(box.getCenter(new THREE.Vector3()));
                scene.add(currentModel);
                
                // Auto-zoom to fit the part
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(maxDim * 2, maxDim * 2, maxDim * 2);
                camera.lookAt(0, 0, 0);
                
                loaderUI.style.display = "none";
            });
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        function populateChapters() {
            const select = document.getElementById('chapterSelect');
            menuData.forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index; opt.innerHTML = item.chapter;
                select.appendChild(opt);
            });
        }
    </script>
</body>
</html>
