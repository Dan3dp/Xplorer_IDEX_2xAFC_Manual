<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xplorer IDEX Twin AFC - Manual</title>
    <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.12/dist/occt-import-js.js"></script>
    <style>
        :root { --accent: #2563eb; --bg: #ffffff; --sidebar: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body.dark-mode { --bg: #121212; --sidebar: #1a1a1a; --text: #e2e8f0; --border: #333; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: background 0.3s; }
        .sidebar { width: 340px; padding: 25px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .progress-container { width: 100%; height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        #step-counter { font-size: 11px; color: #94a3b8; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        select { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: bold; cursor: pointer; }
        .step-content { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        h1 { font-size: 20px; margin: 5px 0; color: var(--accent); }
        #step-desc { line-height: 1.6; font-size: 14px; margin-bottom: 20px; }
        .nav-btns { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        #viewport { flex-grow: 1; position: relative; background: #ffffff; }
        #canvas-container, #media-container { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #media-container { display: none; background: #ffffff; }
        #loader-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: var(--accent); font-weight: bold; z-index: 5; text-align: center; }
        .reset-btn { background: #64748b; font-size: 11px; padding: 8px; width: 100%; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <div id="step-counter">Step 1 of 1</div>
        <select id="chapterSelect" onchange="loadChapter(this.value)"></select>
        <div class="step-content">
            <h1 id="step-title">Xplorer Manual</h1>
            <div id="step-desc">Loading...</div>
            <button id="resetViewBtn" class="reset-btn" onclick="fitCameraToModel()">Reset Camera</button>
        </div>
        <div class="nav-btns">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Back</button>
            <button id="nextBtn" onclick="changeStep(1)" disabled>Next</button>
        </div>
    </div>

    <div id="viewport">
        <div id="loader-ui">Calculating CAD Geometry...<br><small>Please wait</small></div>
        <div id="canvas-container"></div>
        <div id="media-container"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ArcballControls } from 'three/addons/controls/ArcballControls.js';

        let menuData = [], currentChapIdx = 0, currentStepIdx = 0;
        let scene, camera, renderer, controls, currentModel;
        
        // Initialize the CAD engine once
        const occtPromise = occtimportjs();

        fetch('menu.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                menuData = data;
                populateChapters();
                initThree();
                loadStep(0, 0);
            });

        function populateChapters() {
            const select = document.getElementById('chapterSelect');
            menuData.forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index; opt.innerHTML = item.chapter;
                select.appendChild(opt);
            });
        }

        window.loadChapter = (idx) => loadStep(parseInt(idx), 0);
        window.changeStep = (dir) => loadStep(currentChapIdx, currentStepIdx + dir);

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 340) / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.5;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.0));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(5, 10, 7.5);
            scene.add(dirLight);

            controls = new ArcballControls(camera, renderer.domElement, scene);
            controls.setGizmosVisible(false);
            animate();
        }

        async function loadStep(chapIdx, stepIdx) {
            currentChapIdx = chapIdx;
            currentStepIdx = stepIdx;
            const step = menuData[chapIdx].steps[stepIdx];
            const fileName = step.file.toLowerCase();
            const loaderUI = document.getElementById('loader-ui');

            // Update UI
            document.getElementById('step-title').innerText = step.title;
            document.getElementById('step-desc').innerHTML = step.desc.replace(/\n/g, '<br>');
            document.getElementById('progress-fill').style.width = `${((stepIdx + 1) / menuData[chapIdx].steps.length) * 100}%`;

            if (fileName.endsWith('.step') || fileName.endsWith('.stp')) {
                document.getElementById('canvas-container').style.display = "block";
                document.getElementById('media-container').style.display = "none";
                loaderUI.style.display = "block";

                if (currentModel) scene.remove(currentModel);

                // 1. Fetch the raw STEP file
                const response = await fetch(step.file + '?v=' + new Date().getTime());
                const buffer = await response.arrayBuffer();

                // 2. Use the OCCT engine to triangulate the CAD
                const occt = await occtPromise;
                const result = occt.ReadStepFile(new Uint8Array(buffer), null);
                
                // 3. Convert OCCT result to Three.js
                currentModel = new THREE.Group();
                result.meshes.forEach((m) => {
                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(m.attributes.position.array, 3));
                    if (m.attributes.normal) geometry.setAttribute('normal', new THREE.Float32BufferAttribute(m.attributes.normal.array, 3));
                    
                    const material = new THREE.MeshStandardMaterial({ 
                        color: new THREE.Color(m.color ? `rgb(${m.color[0]},${m.color[1]},${m.color[2]})` : '#cccccc'),
                        metalness: 0.5, roughness: 0.5 
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    // Add wireframe edges for CAD look
                    const edges = new THREE.EdgesGeometry(geometry, 20);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x333333 }));
                    mesh.add(line);
                    
                    currentModel.add(mesh);
                });

                const box = new THREE.Box3().setFromObject(currentModel);
                currentModel.position.sub(box.getCenter(new THREE.Vector3()));
                scene.add(currentModel);
                fitCameraToModel();
                loaderUI.style.display = "none";

            } else {
                // PDF/Image logic remains the same
                document.getElementById('canvas-container').style.display = "none";
                document.getElementById('media-container').style.display = "flex";
                loaderUI.style.display = "none";
                document.getElementById('media-container').innerHTML = fileName.endsWith('.pdf') ? 
                    `<iframe src="${step.file}" style="width:100%;height:100%;border:none;"></iframe>` : 
                    `<img src="${step.file}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
            }
        }

        window.fitCameraToModel = () => {
            if (!currentModel) return;
            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const dist = (maxDim / (2 * Math.tan((camera.fov * Math.PI / 180) / 2))) * 1.5;
            camera.position.set(dist, dist, dist);
            camera.lookAt(0, 0, 0);
            controls.target.set(0,0,0);
            controls.update();
        };

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        window.onresize = () => {
            camera.aspect = (window.innerWidth - 340) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
        };
    </script>
</body>
</html>
