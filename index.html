<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional CAD Viewer</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #232323; color: white; overflow: hidden; }
        .sidebar { width: 320px; padding: 30px; background: #1a1a1a; border-right: 1px solid #444; z-index: 100; }
        #container { flex-grow: 1; position: relative; }
        .hint { position: absolute; bottom: 20px; left: 20px; color: #888; font-size: 12px; }
        button { width: 100%; padding: 10px; margin-top: 20px; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Assembly Step 1</h2>
        <p>This viewer uses <strong>Arcball Controls</strong>. You can rotate freely on any axis, just like in your CAD software.</p>
        <button onclick="location.reload()">Reset View</button>
    </div>

    <div id="container">
        <div class="hint">Left Click: Free Rotate (Trackball) | Right Click: Pan | Scroll: Zoom</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ArcballControls } from 'three/addons/controls/ArcballControls.js';

        let scene, camera, renderer, controls;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x232323);

            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 2, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 320, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // Lighting
            const light1 = new THREE.DirectionalLight(0xffffff, 3);
            light1.position.set(5, 5, 5);
            scene.add(light1);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // THE KEY COMPONENT: Arcball Controls (CAD Style)
            controls = new ArcballControls(camera, renderer.domElement, scene);
            controls.setGizmosVisible(false); // Hide the rotation circles for a cleaner look

            // Load your model
            const loader = new GLTFLoader();
            loader.load('100_01__Beam_MGN_Y_Axis__asmbl___V1.glb', function (gltf) {
                const model = gltf.scene;
                
                // Center the model automatically
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                
                scene.add(model);
            }, undefined, function (error) {
                console.error("Error loading model. Check your filename!", error);
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = (window.innerWidth - 320) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 320, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
